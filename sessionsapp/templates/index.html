<style>
  .loader-container {
    position: relative;
    display: flex;
    flex-direction: column; /* direction d'affichage verticale */
    justify-content: center; /* alignement vertical */
  }

  .loader {
    height: 50px;
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
  }
</style>

<br />

<br />
<br />

  <div class="col-xs-12 col-sm-1 fond"></div>

  </div>
</div>

<br />
<br />

</div>

  </div>
</div>

<br />
<br />
<div class="text-center">
  <select id="label" class="form-control" style="width: auto; display: inline-block; font-size: 16px;">

  </select>
</div>

</div>

<script>
  function imageChargee(elt) {
    jQuery(elt).parent().prev().css("display", "none");
    jQuery(elt).parent().prev().prev().css("display", "none");
  }

  function calculeRegression1() {
    $("#regression1").html(
      '<div class="loader-container"><img src="/sessions/static/images/loading.gif" class="loader img-responsive"></div><a target="_blank" href="ia/regressionlineaire?label=' +
        $("#label").val() +
        '">' +
        '<img onload="imageChargee(this)" src="ia/regressionlineaire?label=' +
        $("#label").val() +
        '" class="img-responsive ombre-image "></a>'
    );
  }

  function calculeRegressionArbreDecision() {
    $("#regression-arbre-decision").html(
      '<div class="loader-container"><img src="/sessions/static/images/loading.gif" class="loader img-responsive"></div><a target="_blank" href="ia/arbredecision?label=' +
        $("#label").val() +
        '">' +
        '<img onload="imageChargee(this)" src="ia/arbredecision?label=' +
        $("#label").val() +
        '" class="img-responsive ombre-image "></a>'
    );
  }

  function calculeRegressionPlusProcheVoisins() {
    $("#regression-plus-proche-voisins").html(
      '<div class="loader-container"><img src="/sessions/static/images/loading.gif" class="loader img-responsive"></div><a target="_blank" href="ia/plusprochevoisins?label=' +
        $("#label").val() +
        '">' +
        '<img onload="imageChargee(this)" src="ia/plusprochevoisins?label=' +
        $("#label").val() +
        '" class="img-responsive ombre-image "></a>'
    );
  }

  function calculeRegression2() {
    $("#regression2").html(
      '<div class="loader-container"><img src="/sessions/static/images/loading.gif" class="loader img-responsive"></div><a target="_blank" href="ia/reseauneurones?label=' +
        $("#label").val() +
        "&nbcouches=" +
        $("#nbcouches").val() +
        "&nbneuronescouche=" +
        $("#nbneuronescouche").val() +
        ' ">' +
        '<img onload="imageChargee(this)" src="ia/reseauneurones?label=' +
        $("#label").val() +
        "&nbcouches=" +
        $("#nbcouches").val() +
        "&nbneuronescouche=" +
        $("#nbneuronescouche").val() +
        '" class="img-responsive ombre-image "></a>'
    );
  }

  $(document).ready(function () {
    calculeRegression1();
    calculeRegressionArbreDecision();
    calculeRegressionPlusProcheVoisins();
    calculeRegression2();
    calculeStatistique();
    calculeStatistiqueVoile();
    calculeBarYear();
    calculeBarYearLabel();
    calculePieAile();
    calculePieVoile();
  });

  $("#label").change(function () {
    calculeRegression1();
    calculeRegressionArbreDecision();
    calculeRegressionPlusProcheVoisins();
    calculeRegression2();
    calculeStatistique();
    calculeStatistiqueVoile();
    calculeBarYearLabel();
  });

  $("#calculer").click(function () {
    calculeRegression2();
  });

  function calculeStatistique() {
    $("#statistique").html(
      '<div class="loader-container"><img src="/sessions/static/images/loading.gif" class="loader img-responsive"></div><a target="_blank" href="ia/statistique?label=' +
        $("#label").val() +
        '">' +
        '<img onload="imageChargee(this)" src="ia/statistique?label=' +
        $("#label").val() +
        '" class="img-responsive ombre-image "></a>'
    );
  }

  function calculeStatistiqueVoile() {
    $("#statistique-voile").html(
      '<div class="loader-container"><img src="/sessions/static/images/loading.gif" class="loader img-responsive"></div><a target="_blank" href="ia/statistique/voile?label=' +
        $("#label").val() +
        '">' +
        '<img onload="imageChargee(this)" src="ia/statistique/voile?label=' +
        $("#label").val() +
        '" class="img-responsive ombre-image "></a>'
    );
  }

  function calculeBarYear() {
    $("#bar-year").html(
      '<div class="loader-container"><img src="/sessions/static/images/loading.gif" class="loader img-responsive"></div><a target="_blank" href="ia/bar_year">' +
        '<img onload="imageChargee(this)" src="ia/bar_year" class="img-responsive ombre-image "></a>'
    );
  }

  function calculePieAile() {
    $("#pie-aile").html(
      '<div class="loader-container"><img src="/sessions/static/images/loading.gif" class="loader img-responsive"></div><a target="_blank" href="ia/pie_aile">' +
        '<img onload="imageChargee(this)" src="ia/pie_aile" class="img-responsive ombre-image "></a>'
    );
  }

  function calculePieVoile() {
    $("#pie-voile").html(
      '<div class="loader-container"><img src="/sessions/static/images/loading.gif" class="loader img-responsive"></div><a target="_blank" href="ia/pie_voile">' +
        '<img onload="imageChargee(this)" src="ia/pie_voile" class="img-responsive ombre-image "></a>'
    );
  }

  function calculeBarYearLabel() {
    $("#bar-year-label").html(
      '<div class="loader-container"><img src="/sessions/static/images/loading.gif" class="loader img-responsive"></div><a target="_blank" href="ia/bar_year_label?label=' +
        $("#label").val() +
        '">' +
        '<img onload="imageChargee(this)" src="ia/bar_year_label?label=' +
        $("#label").val() +
        '" class="img-responsive ombre-image "></a>'
    );
  }
</script>
